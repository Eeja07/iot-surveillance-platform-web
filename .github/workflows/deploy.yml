name: Deploy to Server

on:
  push:
    branches:
      - main # Workflow akan jalan setiap push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Masuk ke direktori aplikasi
            cd /var/www/html # Ganti dengan path aplikasi Anda di server

            # Ambil update terbaru dari GitHub
            # Ini tidak akan menimpa .env karena .env biasanya di-ignore oleh git
            git pull origin main

            # Jika menggunakan Docker, build ulang image yang berubah
            # File .env lokal di server akan otomatis dibaca oleh docker-compose
            docker-compose up -d --build

            # Jalankan perintah Laravel di dalam container
            docker-compose exec -T app php artisan migrate --force
            docker-compose exec -T app php artisan optimize:clear

            echo "Deployment Berhasil!"

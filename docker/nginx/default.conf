server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;   # service name "app" di compose
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # --- PERBAIKAN KRITIS UNTUK AUTHORIZATION ---
        # Hapus default yang membersihkan header
        # Menambahkan header Authorization ke daftar yang diteruskan
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param AUTHORIZATION $http_authorization;

        # WAJIB: Tambahkan ini untuk memastikan header otorisasi diteruskan
        fastcgi_pass_header Authorization;
        # --------------------------------------------
    }

    # Jangan izinkan akses file tersembunyi (.env, .git, dll)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

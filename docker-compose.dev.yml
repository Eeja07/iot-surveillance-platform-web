# version: "3.9"   # <- opsional, boleh dihapus (sudah deprecated di compose v2+)
x-env: &default-env
  TZ: "Asia/Jakarta"
networks:
  laravel_net:
    driver: bridge
volumes:
  db_data:
  emqx_data:
  emqx_log:
  minio_data:
services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: laravel_CCTV_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *default-env
      APP_ENV: local
      APP_DEBUG: "true"
      PHP_OPCACHE_ENABLE: "0"
    volumes:
      - ./:/var/www/html
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    networks:
      - laravel_net
  web:
    image: nginx:alpine
    container_name: laravel_web_dev
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8084:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      <<: *default-env
    networks:
      - laravel_net
  db:
    image: mysql:8.0
    container_name: laravel_CCTV_db_dev
    hostname: db
    restart: unless-stopped
    environment:
      <<: *default-env
      MYSQL_DATABASE: Sistem_Camera_MIOT
      MYSQL_ROOT_PASSWORD: root
    command: >
      mysqld --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --skip-log-bin
             --sql_mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_net
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: laravel_CCTV_phpmyadmin_dev
    restart: unless-stopped
    depends_on:
      - db
    environment:
      <<: *default-env
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    ports:
      - "8085:80"
    networks:
      - laravel_net
  emqx:
    image: emqx/emqx:latest
    container_name: laravel_emqx_dev
    restart: unless-stopped
    environment:
      <<: *default-env
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: admin123
      EMQX_API__AUTHORIZATION__ENABLE: "true"
      EMQX_ALLOW_ANONYMOUS: "false"
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - laravel_net
  minio:
    image: minio/minio:latest
    container_name: laravel-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Jakarta
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - laravel_net
